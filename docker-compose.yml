services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spider_backend
    environment:
      DB_HOST: db
      DB_NAME: spider_db
      DB_USER: spider_user
      DB_PASSWORD: spider_password
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MONGO_URI: mongodb://mongo_user:mongo_password@mongo:27017/
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongo
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spider_worker
    environment:
      DB_HOST: db
      DB_NAME: spider_db
      DB_USER: spider_user
      DB_PASSWORD: spider_password
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MONGO_URI: mongodb://mongo_user:mongo_password@mongo:27017/
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - db
      - mongo
      - redis
    command: ["celery","-A","spiderscope","worker","-l","info"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: spider_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: spider_postgres
    environment:
      POSTGRES_DB: spider_db
      POSTGRES_USER: spider_user
      POSTGRES_PASSWORD: spider_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6.0
    container_name: spider_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: spider_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  mongo_data:
  redis_data:
